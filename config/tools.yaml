# ============================================================
# Renine — Tool Permissions Configuration
# ============================================================
# Each tool can be enabled/disabled and assigned a permission level.
# Permission levels: READ_ONLY (0), STANDARD (1), ELEVATED (2), DESTRUCTIVE (3)
# ============================================================

tools:
  # --- System Tools (Phase 4) ---
  app_launcher:
    enabled: true
    permission_level: 2  # ELEVATED — requires confirmation
    whitelist:
      - notepad
      - calc
      - cmd
      - explorer
      - mspaint
      - taskmgr
  volume_control:
    enabled: true
    permission_level: 1  # STANDARD
  clipboard:
    enabled: true
    permission_level: 1  # STANDARD

  # --- File Tools (Phase 4) ---
  file_reader:
    enabled: true
    permission_level: 0  # READ_ONLY
  file_search:
    enabled: true
    permission_level: 0  # READ_ONLY
  pdf_reader:
    enabled: true
    permission_level: 0  # READ_ONLY

  # --- Scheduling Tools (Phase 3) ---
  alarm:
    enabled: false
    permission_level: 1  # STANDARD
  reminder:
    enabled: false
    permission_level: 1  # STANDARD
  timer:
    enabled: false
    permission_level: 1  # STANDARD

  # --- Vision Tools (Phase 5) ---
  screenshot:
    enabled: true
    permission_level: 0  # READ_ONLY
  ocr:
    enabled: true
    permission_level: 0  # READ_ONLY
  webcam:
    enabled: true
    permission_level: 2  # ELEVATED — requires user consent

  # --- Web Tools (Phase 6) ---
  browser:
    enabled: true
    permission_level: 2  # ELEVATED

  # --- Smart Home Tools (Phase 7) ---
  discover_smart_devices:
    enabled: true
    permission_level: 0  # READ_ONLY
  get_smart_device_status:
    enabled: true
    permission_level: 0  # READ_ONLY
  control_smart_device:
    enabled: true
    permission_level: 1  # STANDARD — requires explicit user confirmation
    allowed_domains:
      - light
      - switch
      - fan
      - cover
